<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tablero de rutas — 2023 a 2025</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #F7F6F2;
  --surface: #FFFFFF;
  --border: rgba(0,0,0,0.08);
  --border-strong: rgba(0,0,0,0.14);
  --text-primary: #1A1916;
  --text-secondary: #6B6960;
  --text-muted: #9E9B93;
  --red-fill: #FCEBEB;
  --red-text: #A32D2D;
  --red-line: #E24B4A;
  --amber-fill: #FAEEDA;
  --amber-text: #854F0B;
  --amber-line: #EF9F27;
  --gray-fill: #F1EFE8;
  --gray-text: #5F5E5A;
  --blue-fill: #E6F1FB;
  --blue-text: #0C447C;
  --blue-line: #185FA5;
  --radius: 10px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text-primary);
  min-height: 100vh;
  padding: 2rem 1.5rem 3rem;
}
.page-header {
  margin-bottom: 1.75rem;
}
.page-header h1 {
  font-size: 22px;
  font-weight: 500;
  letter-spacing: -0.3px;
}
.page-header p {
  font-size: 13px;
  color: var(--text-secondary);
  margin-top: 4px;
}
.metrics {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
  margin-bottom: 1.5rem;
}
@media (max-width: 640px) {
  .metrics { grid-template-columns: repeat(2, 1fr); }
}
.metric {
  background: var(--surface);
  border: 0.5px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 16px;
}
.metric .m-label { font-size: 11px; color: var(--text-muted); margin-bottom: 5px; letter-spacing: 0.3px; }
.metric .m-value { font-size: 24px; font-weight: 500; font-family: 'DM Mono', monospace; letter-spacing: -1px; }
.metric .m-sub { font-size: 11px; color: var(--text-muted); margin-top: 3px; }
.controls {
  display: flex; gap: 8px; align-items: center; margin-bottom: 12px; flex-wrap: wrap;
}
.controls label { font-size: 12px; color: var(--text-secondary); }
select {
  font-family: 'DM Sans', sans-serif;
  font-size: 12px;
  padding: 5px 10px;
  border: 0.5px solid var(--border-strong);
  border-radius: 6px;
  background: var(--surface);
  color: var(--text-primary);
  cursor: pointer;
  outline: none;
}
select:focus { border-color: var(--blue-line); }
.search-wrap { flex: 1; min-width: 140px; }
.search-wrap input {
  width: 100%;
  font-family: 'DM Sans', sans-serif;
  font-size: 12px;
  padding: 5px 10px;
  border: 0.5px solid var(--border-strong);
  border-radius: 6px;
  background: var(--surface);
  color: var(--text-primary);
  outline: none;
}
.search-wrap input:focus { border-color: var(--blue-line); }
.search-wrap input::placeholder { color: var(--text-muted); }
.table-card {
  background: var(--surface);
  border: 0.5px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
}
table { width: 100%; border-collapse: collapse; table-layout: fixed; font-size: 13px; }
thead th {
  background: var(--bg);
  padding: 9px 12px;
  text-align: left;
  font-weight: 500;
  font-size: 11px;
  color: var(--text-secondary);
  border-bottom: 0.5px solid var(--border);
  cursor: pointer;
  user-select: none;
  letter-spacing: 0.2px;
  white-space: nowrap;
}
thead th:hover { color: var(--text-primary); }
tbody tr { border-bottom: 0.5px solid var(--border); transition: background 0.1s; }
tbody tr:last-child { border-bottom: none; }
tbody tr:hover { background: var(--bg); }
tbody td { padding: 9px 12px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.td-ruta { font-family: 'DM Mono', monospace; font-size: 12px; font-weight: 500; }
.td-num { text-align: right; color: var(--text-secondary); font-variant-numeric: tabular-nums; font-size: 12px; }
.td-total { text-align: right; font-weight: 500; font-variant-numeric: tabular-nums; font-size: 12px; }
.td-dif { text-align: right; }
.td-bar { padding: 9px 12px 9px 4px; }
.badge {
  display: inline-block; font-size: 10px; font-weight: 500;
  padding: 2px 7px; border-radius: 4px; font-family: 'DM Mono', monospace;
}
.b-zero { background: var(--gray-fill); color: var(--gray-text); }
.b-high { background: var(--amber-fill); color: var(--amber-text); }
.b-low  { background: var(--red-fill);   color: var(--red-text); }
.sort-arrow { font-size: 10px; opacity: 0.35; margin-left: 3px; }
.sort-arrow.on { opacity: 1; }
.pagination {
  display: flex; gap: 6px; align-items: center;
  justify-content: flex-end; margin-top: 10px;
  font-size: 12px; color: var(--text-secondary);
}
.pg-btn {
  background: var(--surface); border: 0.5px solid var(--border-strong);
  border-radius: 6px; padding: 4px 10px; cursor: pointer;
  font-size: 11px; color: var(--text-primary); font-family: 'DM Sans', sans-serif;
}
.pg-btn:disabled { opacity: 0.3; cursor: default; }
.pg-btn:not(:disabled):hover { background: var(--bg); }

/* ---- chart section ---- */
.chart-section { margin-top: 2rem; }
.section-title { font-size: 14px; font-weight: 500; margin-bottom: 4px; }
.section-sub { font-size: 12px; color: var(--text-secondary); margin-bottom: 12px; }
.chart-controls { display: flex; gap: 8px; align-items: center; margin-bottom: 10px; flex-wrap: wrap; }
.chart-legend { display: flex; gap: 14px; margin-bottom: 10px; font-size: 11px; color: var(--text-secondary); }
.chart-legend span { display: flex; align-items: center; gap: 4px; }
.chart-legend i { width: 10px; height: 10px; border-radius: 2px; display: inline-block; }
.chart-card {
  background: var(--surface);
  border: 0.5px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
}
</style>
</head>
<body>

<div class="page-header">
  <h1>Tablero de rutas — 2023 a 2025</h1>
  <p>Comparativo de volumen por año y diferencia porcentual 2023 vs 2025</p>
</div>

<div class="metrics" id="metricsRow"></div>

<div class="controls">
  <label>Filtrar:</label>
  <select id="filterSel" onchange="applyFilter()">
    <option value="all">Todas las rutas</option>
    <option value="100">100% diferencia</option>
    <option value="high">Más del 75%</option>
    <option value="mid">Entre 50% y 75%</option>
    <option value="low">Menos del 50%</option>
  </select>
  <label>Mostrar:</label>
  <select id="pageSizeSel" onchange="applyFilter()">
    <option value="15">15 filas</option>
    <option value="25">25 filas</option>
    <option value="50">50 filas</option>
    <option value="999">Todas</option>
  </select>
  <div class="search-wrap">
    <input type="text" id="searchInput" placeholder="Buscar ruta…" oninput="applyFilter()" />
  </div>
</div>

<div class="table-card">
  <table>
    <thead>
      <tr>
        <th style="width:17%" onclick="sortBy('ruta')">Ruta <span class="sort-arrow" id="sa-ruta">↕</span></th>
        <th style="width:16%;text-align:right" onclick="sortBy('v2023')">2,023 <span class="sort-arrow" id="sa-v2023">↕</span></th>
        <th style="width:16%;text-align:right" onclick="sortBy('v2024')">2,024 <span class="sort-arrow" id="sa-v2024">↕</span></th>
        <th style="width:16%;text-align:right" onclick="sortBy('v2025')">2,025 <span class="sort-arrow" id="sa-v2025">↕</span></th>
        <th style="width:16%;text-align:right" onclick="sortBy('total')">Total <span class="sort-arrow" id="sa-total">↕</span></th>
        <th style="width:11%;text-align:right" onclick="sortBy('dif')">Dif % <span class="sort-arrow" id="sa-dif">↕</span></th>
        <th style="width:8%"></th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>
</div>
<div class="pagination" id="paginationRow"></div>

<div class="chart-section">
  <div class="section-title">Pasaje perdido por ruta (2023 − 2025)</div>
  <div class="section-sub">Ordenado por volumen perdido. Rojo = perdido, azul = retenido en 2025.</div>
  <div class="chart-controls">
    <label style="font-size:12px;color:var(--text-secondary)">Mostrar top:</label>
    <select id="topN" onchange="renderChart()">
      <option value="15" selected>15 rutas</option>
      <option value="25">25 rutas</option>
      <option value="62">Todas</option>
    </select>
    <label style="font-size:12px;color:var(--text-secondary);margin-left:6px">Ordenar por:</label>
    <select id="sortMode" onchange="renderChart()">
      <option value="abs">Pasaje perdido (absoluto)</option>
      <option value="pct">Diferencia %</option>
    </select>
  </div>
  <div class="chart-legend">
    <span><i style="background:#E24B4A"></i>Perdido (2023 − 2025)</span>
    <span><i style="background:#185FA5"></i>Retenido (2025)</span>
  </div>
  <div class="chart-card">
    <div id="chartWrap" style="position:relative;width:100%">
      <canvas id="lostChart" role="img" aria-label="Barras horizontales de pasaje perdido por ruta"></canvas>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>

  {ruta:"C06-1",v2023:1648994,v2024:2104127,v2025:638923,total:4392044,dif:61.25},
  {ruta:"T02-PV",v2023:90053,v2024:650289,v2025:35382,total:775724,dif:60.71},
  {ruta:"C111-2",v2023:1183141,v2024:541319,v2025:468743,total:2193203,dif:60.38},
  {ruta:"T13B-5",v2023:2384805,v2024:2534413,v2025:962139,total:5881357,dif:59.66},
  {ruta:"C118",v2023:600705,v2024:582314,v2025:247385,total:1430404,dif:58.82},

  {ruta:"C10",v2023:1667299,v2024:1207725,v2025:725798,total:3600822,dif:56.47},
  {ruta:"C71",v2023:2071722,v2024:1839764,v2025:997395,total:4908881,dif:51.86},
  {ruta:"C09",v2023:4007110,v2024:3147168,v2025:1984391,total:9138669,dif:50.48},
];

const fmt = n => n.toLocaleString('es-MX');
const fmtM = n => n >= 1e6 ? (n/1e6).toFixed(1)+'M' : n >= 1e3 ? (n/1e3).toFixed(0)+'K' : String(n);

let sortCol = 'total', sortAsc = false, currentPage = 1;

function badgeFor(dif) {
  if (dif >= 100) return `<span class="badge b-zero">100%</span>`;
  if (dif >= 50)  return `<span class="badge b-high">${dif.toFixed(2)}%</span>`;
  return `<span class="badge b-low">${dif.toFixed(2)}%</span>`;
}
function barColor(dif) {
  if (dif >= 100) return '#9E9B93';
  if (dif >= 50)  return '#EF9F27';
  return '#E24B4A';
}
function sortBy(col) {
  if (sortCol === col) sortAsc = !sortAsc;
  else { sortCol = col; sortAsc = false; }
  applyFilter();
}
function getData() {
  const search = document.getElementById('searchInput').value.toLowerCase();
  const mode = document.getElementById('filterSel').value;
  return raw.filter(r => {
    if (search && !r.ruta.toLowerCase().includes(search)) return false;
    if (mode === '100') return r.dif >= 100;
    if (mode === 'high') return r.dif >= 75 && r.dif < 100;
    if (mode === 'mid') return r.dif >= 50 && r.dif < 75;
    if (mode === 'low') return r.dif < 50;
    return true;
  }).sort((a,b) => {
    const av = sortCol === 'ruta' ? a.ruta : a[sortCol];
    const bv = sortCol === 'ruta' ? b.ruta : b[sortCol];
    return sortAsc ? (av > bv ? 1 : -1) : (av < bv ? 1 : -1);
  });
}
function applyFilter() { currentPage = 1; render(); }
function goPage(p) { currentPage = p; render(); }

function render() {
  const data = getData();
  const ps = parseInt(document.getElementById('pageSizeSel').value);
  const totalPages = Math.ceil(data.length / ps);
  if (currentPage > totalPages) currentPage = Math.max(1, totalPages);
  const page = data.slice((currentPage-1)*ps, currentPage*ps);

  ['ruta','v2023','v2024','v2025','total','dif'].forEach(c => {
    const el = document.getElementById('sa-'+c);
    if (el) { el.textContent = sortCol===c ? (sortAsc?'↑':'↓') : '↕'; el.className='sort-arrow'+(sortCol===c?' on':''); }
  });

  document.getElementById('tableBody').innerHTML = page.map(r => `
    <tr>
      <td class="td-ruta">${r.ruta}</td>
      <td class="td-num">${fmt(r.v2023)}</td>
      <td class="td-num">${fmt(r.v2024)}</td>
      <td class="td-num">${fmt(r.v2025)}</td>
      <td class="td-total">${fmt(r.total)}</td>
      <td class="td-dif">${badgeFor(r.dif)}</td>
      <td class="td-bar">
        <div style="width:44px;height:5px;background:#F1EFE8;border-radius:3px;overflow:hidden;display:inline-block;vertical-align:middle">
          <div style="width:${Math.min(r.dif,100)}%;height:100%;background:${barColor(r.dif)};border-radius:3px"></div>
        </div>
      </td>
    </tr>`).join('');

  const pag = document.getElementById('paginationRow');
  if (totalPages <= 1) { pag.innerHTML = `<span>${data.length} rutas</span>`; }
  else { pag.innerHTML = `<span>${data.length} rutas · pág. ${currentPage} de ${totalPages}</span>
    <button class="pg-btn" onclick="goPage(${currentPage-1})" ${currentPage===1?'disabled':''}>‹ Ant.</button>
    <button class="pg-btn" onclick="goPage(${currentPage+1})" ${currentPage===totalPages?'disabled':''}>Sig. ›</button>`; }

  const total = data.reduce((s,r)=>s+r.total,0);
  const avg = data.length ? data.reduce((s,r)=>s+r.dif,0)/data.length : 0;
  const zero = data.filter(r=>r.v2025===0).length;
  const totalLost = data.reduce((s,r)=>s+(r.v2023-r.v2025),0);
  document.getElementById('metricsRow').innerHTML = `
    <div class="metric"><div class="m-label">Rutas en vista</div><div class="m-value">${data.length}</div><div class="m-sub">de ${raw.length} totales</div></div>
    <div class="metric"><div class="m-label">Volumen total</div><div class="m-value">${fmtM(total)}</div><div class="m-sub">pasajeros acumulados</div></div>
    <div class="metric"><div class="m-label">Dif. promedio</div><div class="m-value">${avg.toFixed(1)}%</div><div class="m-sub">2023 vs 2025</div></div>
    <div class="metric"><div class="m-label">Sin datos 2025</div><div class="m-value">${zero}</div><div class="m-sub">rutas con 0 en 2025</div></div>`;
}

let chartInst = null;
function renderChart() {
  const n = parseInt(document.getElementById('topN').value);
  const mode = document.getElementById('sortMode').value;
  const withLost = raw.map(r => ({...r, lost: r.v2023-r.v2025, pct: (r.v2023-r.v2025)/r.v2023*100}));
  const sorted = [...withLost].sort((a,b) => mode==='abs' ? b.lost-a.lost : b.pct-a.pct).slice(0,n);
  const h = Math.max(300, sorted.length*34+80);
  document.getElementById('chartWrap').style.height = h+'px';
  if (chartInst) chartInst.destroy();
  chartInst = new Chart(document.getElementById('lostChart'), {
    type: 'bar',
    data: {
      labels: sorted.map(r=>r.ruta),
      datasets: [
        { label:'Perdido', data: sorted.map(r=>r.lost), backgroundColor:'#E24B4A', borderWidth:0, borderRadius:2 },
        { label:'Retenido', data: sorted.map(r=>r.v2025), backgroundColor:'#185FA5', borderWidth:0, borderRadius:2 }
      ]
    },
    options: {
      indexAxis:'y', responsive:true, maintainAspectRatio:false,
      plugins: {
        legend:{ display:false },
        tooltip:{ callbacks:{
          label: ctx => {
            const r = sorted[ctx.dataIndex];
            if (ctx.datasetIndex===0) return ` Perdido: ${r.lost.toLocaleString('es-MX')} (${r.pct.toFixed(1)}%)`;
            return ` Retenido 2025: ${r.v2025.toLocaleString('es-MX')}`;
          },
          afterBody: items => ['Base 2023: '+sorted[items[0].dataIndex].v2023.toLocaleString('es-MX')]
        }}
      },
      scales:{
        x:{ stacked:true, ticks:{font:{size:11,family:'DM Mono'},color:'#9E9B93',callback:v=>fmtM(v)}, grid:{color:'rgba(0,0,0,0.05)'} },
        y:{ stacked:true, ticks:{font:{size:11,family:'DM Mono'},color:'#444441'}, grid:{display:false} }
      }
    }
  });
}

render();
renderChart();
</script>
</body>
</html>
